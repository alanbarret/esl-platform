<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ESL Avatar Viewer</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1a2e; overflow: hidden; }
  canvas { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const params = new URLSearchParams(location.search);
const modelUrl = params.get('model') || './arab_sheik_idle.glb';
const width = parseInt(params.get('w') || '720', 10);
const height = parseInt(params.get('h') || '720', 10);
const fps = parseInt(params.get('fps') || '24', 10);

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(35, width / height, 0.1, 100);
camera.position.set(0, 1.5, 3.2);
camera.lookAt(0, 1.0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(width, height);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lighting
const hemi = new THREE.HemisphereLight(0xffffff, 0x444466, 0.7);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 1.2);
key.position.set(2, 3, 4);
scene.add(key);
const fill = new THREE.DirectionalLight(0x8899ff, 0.4);
fill.position.set(-3, 2, 1);
scene.add(fill);

// Ground (subtle)
const groundGeo = new THREE.CircleGeometry(2.5, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222237, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Status
window.__renderReady = false;
window.__animDuration = 0;
window.__mixer = null;
window.__action = null;

const loader = new GLTFLoader();
loader.load(modelUrl, (gltf) => {
  const model = gltf.scene;
  window.__loadedModel = model;
  scene.add(model);

  // RPM models come in T-pose at origin; scale already in meters
  // Find approximate head height to frame camera
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  camera.position.set(0, center.y + 0.05, size.y * 1.6);
  camera.lookAt(center.x, center.y, 0);

  // Blend ESL animation on top of the looping idle so the rest pose between
  // signs is the idle pose (mixamo.com) rather than the bare T-pose.
  const FADE = 0.25;
  const POST_HOLD = 0.4;
  if (gltf.animations && gltf.animations.length) {
    const mixer = new THREE.AnimationMixer(model);
    const eslAnim = gltf.animations.find(a => a.name === 'ESL_DigiHuman') || gltf.animations[0];
    const idleAnim = gltf.animations.find(a => a !== eslAnim) || eslAnim;

    const idleAction = mixer.clipAction(idleAnim);
    idleAction.setLoop(THREE.LoopRepeat, Infinity);
    idleAction.setEffectiveWeight(1.0);
    // Start the idle clip past its first frame so we never see the T-pose
    // bind pose that often sits at idle frame 0 in Mixamo exports.
    idleAction.time = (idleAnim.duration || 1.0) * 0.4;
    idleAction.play();

    const eslAction = mixer.clipAction(eslAnim);
    eslAction.setLoop(THREE.LoopOnce, 1);
    eslAction.clampWhenFinished = true;
    eslAction.setEffectiveWeight(0.0);
    eslAction.play();
    eslAction.paused = true;  // hold ESL at frame 0 so it doesn't "leak" into the initial pose
    // Force several mixer updates + scene matrix update so the model is
    // in the idle pose BEFORE the renderer ever sees it.
    for (let i = 0; i < 3; i++) mixer.update(0.016);
    scene.updateMatrixWorld(true);
    model.updateMatrixWorld(true);

    window.__mixer = mixer;
    window.__action = eslAction;
    window.__idleAction = idleAction;
    window.__eslDuration = eslAnim.duration;
    window.__animDuration = FADE + eslAnim.duration + FADE + POST_HOLD;
    window.__lastT = -1;
    console.log('Loaded ESL:', eslAnim.name, 'duration:', eslAnim.duration,
                ' + idle:', idleAnim.name, ' total:', window.__animDuration);
  }
  // Tighter framing: zoom in to upper body for sign-language match with source videos.
  // Source signing videos are usually upper-body shots (head -> waist).
  // Find the head and hips positions to frame just the upper body.
  const tmpVec = new THREE.Vector3();
  let headY = center.y + size.y * 0.45;
  let hipsY = center.y - size.y * 0.05;
  model.traverse((obj) => {
    if (obj.name === 'Head') { obj.getWorldPosition(tmpVec); headY = tmpVec.y; }
    if (obj.name === 'Hips') { obj.getWorldPosition(tmpVec); hipsY = tmpVec.y; }
  });
  // Frame: just below hips at bottom, slightly above head at top.
  const targetY = (headY + hipsY) * 0.5;
  const upperHeight = (headY - hipsY) * 1.6; // include some padding
  // Distance so upperHeight fits ~70% of frame height at fov=35°
  const cameraDistance = upperHeight / (2 * Math.tan(THREE.MathUtils.degToRad(35) / 2)) / 0.7;
  camera.position.set(0, targetY, cameraDistance);
  camera.lookAt(0, targetY, 0);
  window.__renderReady = true;
}, undefined, (err) => {
  console.error('GLTF load error:', err);
  window.__renderError = String(err);
});

// Bones we want screen-space positions for (Mixamo names)
const TRACKED_BONES = [
  'Hips', 'Spine', 'Spine2', 'Neck', 'Head',
  'LeftShoulder', 'LeftArm', 'LeftForeArm', 'LeftHand',
  'RightShoulder', 'RightArm', 'RightForeArm', 'RightHand',
  // Hand joints (skip Thumb4/Index4/etc tips for clarity)
  'LeftHandThumb1', 'LeftHandThumb2', 'LeftHandThumb3',
  'LeftHandIndex1', 'LeftHandIndex2', 'LeftHandIndex3',
  'LeftHandMiddle1', 'LeftHandMiddle2', 'LeftHandMiddle3',
  'LeftHandRing1', 'LeftHandRing2', 'LeftHandRing3',
  'LeftHandPinky1', 'LeftHandPinky2', 'LeftHandPinky3',
  'RightHandThumb1', 'RightHandThumb2', 'RightHandThumb3',
  'RightHandIndex1', 'RightHandIndex2', 'RightHandIndex3',
  'RightHandMiddle1', 'RightHandMiddle2', 'RightHandMiddle3',
  'RightHandRing1', 'RightHandRing2', 'RightHandRing3',
  'RightHandPinky1', 'RightHandPinky2', 'RightHandPinky3',
];

function getBoneScreenPositions() {
  // Find each tracked bone and project its world position to screen space.
  const result = {};
  if (!window.__loadedModel) return result;
  const tmp = new THREE.Vector3();
  window.__loadedModel.traverse((obj) => {
    if (TRACKED_BONES.includes(obj.name)) {
      obj.getWorldPosition(tmp);
      tmp.project(camera);
      // NDC -> pixel coords. y is flipped.
      const x = (tmp.x * 0.5 + 0.5);
      const y = (-tmp.y * 0.5 + 0.5);
      result[obj.name] = [x, y, tmp.z];
    }
  });
  return result;
}

// Manual frame stepping (called by puppeteer)
function getCameraMatrices() {
  return {
    projection: camera.projectionMatrix.toArray(),
    matrixWorldInverse: camera.matrixWorldInverse.toArray(),
    position: camera.position.toArray(),
    width, height,
  };
}

window.__renderFrameAtTime = function (t) {
  const mixer = window.__mixer;
  if (mixer) {
    const FADE = 0.25;
    const eslDur = window.__eslDuration || 1.0;
    // Step the mixer by the delta since the previous frame. On the very
    // first frame use 0 so we don't lurch the mixer forward by `t` seconds
    // (which would skip past the idle pose into whatever the ESL clip has).
    const lastT = window.__lastT >= 0 ? window.__lastT : t;
    const dt = (window.__lastT < 0) ? 0 : Math.max(0, t - lastT);
    window.__lastT = t;

    // Phase weights.
    //
    // We drive the ESL action's playhead MANUALLY by clip-time so the clip
    // can never loop, no matter what AnimationMixer thinks of LoopOnce or
    // clampWhenFinished. The clip's playhead is bounded to [0, duration],
    // and during POST_HOLD we just hold it at `duration` (last keyframe).
    let idleW = 1, eslW = 0;
    if (t < FADE) {
      const k = t / FADE; idleW = 1 - k; eslW = k;
    } else {
      // Active sign AND post-hold: ESL clip alone, with playhead clamped
      // to its last keyframe during POST_HOLD so the avatar freezes there.
      idleW = 0; eslW = 1;
    }
    if (window.__action) {
      window.__action.paused = false;
      // ESL clip-time = real time minus the FADE-in offset, clamped to clip duration.
      const clipT = Math.max(0, Math.min(eslDur, t - FADE));
      window.__action.time = clipT;
      window.__action.setEffectiveWeight(eslW);
    }
    if (window.__idleAction) window.__idleAction.setEffectiveWeight(idleW);
    mixer.update(dt);
  }
  renderer.render(scene, camera);
  const bones = getBoneScreenPositions();
  return { img: renderer.domElement.toDataURL('image/png'), bones, camera: getCameraMatrices() };
};

// Legacy entry point that returns only the image
window.__renderFrameAtTimeImg = function (t) {
  if (window.__mixer) window.__mixer.setTime(t);
  renderer.render(scene, camera);
  return renderer.domElement.toDataURL('image/png');
};

// Convenience: idle render loop just for visual debugging when opened in a real browser
let last = performance.now();
function loop() {
  const now = performance.now();
  const dt = (now - last) / 1000;
  last = now;
  if (window.__renderReady && !window.__manualMode) {
    if (window.__mixer) window.__mixer.update(dt);
    renderer.render(scene, camera);
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
