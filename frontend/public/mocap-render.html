<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar MoCap Render</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#09090B; color:#e1e1e1; font-family:-apple-system,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
canvas { border-radius:10px; box-shadow:0 0 40px #7c3aed44; }
#status { font-size:13px; color:#888; }
#progress-bar { width:480px; height:6px; background:#222; border-radius:3px; overflow:hidden; }
#progress-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#a855f7); width:0%; transition:width 0.1s; border-radius:3px; }
#btns { display:flex; gap:10px; }
button { background:#7c3aed; color:#fff; border:none; border-radius:8px; padding:8px 20px; font-size:13px; font-weight:700; cursor:pointer; }
button:disabled { background:#333; color:#555; cursor:default; }
button.green { background:#A8FF4B; color:#000; }
</style>
</head>
<body>
<div style="font-size:18px;font-weight:700;color:#fff">🎬 3D Avatar Motion Capture Render</div>
<canvas id="c" width="640" height="720"></canvas>
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="status">Loading...</div>
<div id="btns">
  <button id="btn-play" disabled onclick="startRender()">▶ Render to Video</button>
  <button id="btn-dl" disabled class="green" onclick="downloadVideo()">⬇ Download MP4</button>
</div>

<script type="importmap">
{"imports":{
  "three":"/three/three.module.js",
  "three/addons/loaders/GLTFLoader.js":"/three/GLTFLoader.js",
  "three/addons/controls/OrbitControls.js":"/three/OrbitControls.js"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const CW=640, CH=720;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, preserveDrawingBuffer:true});
renderer.setSize(CW,CH); renderer.setPixelRatio(1);
renderer.shadowMap.enabled=true;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x09090B);

const camera = new THREE.PerspectiveCamera(42, CW/CH, 0.01, 100);
camera.position.set(0, 1.35, 2.4); camera.lookAt(0,1.0,0);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 1.4);
dir.position.set(1.5,4,2); dir.castShadow=true; scene.add(dir);
scene.add(Object.assign(new THREE.PointLight(0x8060ff,0.6),{position:new THREE.Vector3(-2,2,-1)}));
scene.add(Object.assign(new THREE.PointLight(0x60a0ff,0.3),{position:new THREE.Vector3(2,1,-2)}));

const floor = new THREE.Mesh(new THREE.PlaneGeometry(6,6),
  new THREE.MeshStandardMaterial({color:0x111120,roughness:0.9}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
scene.add(new THREE.GridHelper(4,20,0x1a1a2e,0x1a1a2e));

const boneMap = new Map();
const restMap = new Map();
let motionData = null;
let currentFrame = 0;
let isPlaying = false;
let recordedChunks = [];
let mediaRecorder = null;

const status = document.getElementById('status');
const fill = document.getElementById('progress-fill');

// Load avatar
status.textContent = 'Loading 3D avatar...';
new GLTFLoader().load('/avatar/arab-man.glb', gltf => {
  gltf.scene.traverse(obj => {
    obj.castShadow=true; obj.receiveShadow=true;
    if(obj.name){ boneMap.set(obj.name,obj); restMap.set(obj.name,obj.quaternion.clone()); }
  });
  scene.add(gltf.scene);
  window.renderer = renderer;
  window.scene = scene;
  window.camera = camera;
  status.textContent = 'Loading motion data...';
  loadMotion();
}, xhr => {
  status.textContent = `Loading avatar: ${Math.round(xhr.loaded/xhr.total*100)}%`;
});

async function loadMotion() {
  const r = await fetch('/motion_data.json');
  motionData = await r.json();
  status.textContent = `Ready — ${motionData.frames.length} frames @ ${motionData.fps}fps`;
  document.getElementById('btn-play').disabled = false;
  // Preview first frame
  applyFrame(0);
  renderer.render(scene, camera);
}

window.applyFrame = function applyFrame(fi) {
  const frameData = motionData.frames[fi];
  for(const [bone, q] of Object.entries(frameData)) {
    const obj = boneMap.get(bone);
    if(!obj) continue;
    obj.quaternion.set(q[0], q[1], q[2], q[3]);
  }
  // Reset unkeyed bones to rest
}

window.startRender = async function() {
  document.getElementById('btn-play').disabled=true;
  status.textContent = 'Recording...';
  recordedChunks = [];

  // Set up MediaRecorder on the canvas stream
  const stream = canvas.captureStream(motionData.fps);
  const options = {mimeType:'video/webm;codecs=vp9', videoBitsPerSecond:4000000};
  mediaRecorder = new MediaRecorder(stream, options);
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    status.textContent = 'Encoding done — click Download!';
    document.getElementById('btn-dl').disabled = false;
  };
  mediaRecorder.start();

  const fps = motionData.fps;
  const total = motionData.frames.length;
  const frameMs = 1000/fps;

  for(let fi=0; fi<total; fi++) {
    applyFrame(fi);
    renderer.render(scene, camera);
    fill.style.width = `${(fi+1)/total*100}%`;
    status.textContent = `Rendering frame ${fi+1}/${total}`;
    await new Promise(r => setTimeout(r, frameMs));
  }
  mediaRecorder.stop();
};

window.downloadVideo = function() {
  const blob = new Blob(recordedChunks, {type:'video/webm'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='avatar_3d_motion.webm';
  a.click(); URL.revokeObjectURL(url);
};

// Preview loop
let previewFi=0;
function previewLoop() {
  requestAnimationFrame(previewLoop);
  if(!motionData || document.getElementById('btn-play').disabled) { renderer.render(scene,camera); return; }
  previewFi = (previewFi+1) % motionData.frames.length;
  applyFrame(previewFi);
  renderer.render(scene,camera);
}
previewLoop();
</script>
</body>
</html>
